name: Azure ci cd docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env: 
  # Cambia 'caromero' si el laboratorio te obligó a usar otro nombre único
  REGISTRY_NAME: caromero.azurecr.io/repo/appimg
 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Versión v4 es la estable actual

      # Setup Buildx es más estándar y eficiente para GitHub Actions
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build an image from Dockerfile
        run: docker build -t app:${{ github.sha }} .

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: caromero.azurecr.io
          username: ${{ vars.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # CORREGIDO: Se usa docker/build-push-action para subir al ACR
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:${{ github.run_number }}
            ${{ env.REGISTRY_NAME }}/${{ env.IMAGE_NAME }}:latest