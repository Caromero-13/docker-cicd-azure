name: Azure ci cd docker

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env: 
  # Cambia 'caromero' si el laboratorio te obligó a usar otro nombre único
  IMAGE_NAME: caromero.azurecr.io/repo/appimg
 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Versión v4 es la estable actual

      # Setup Buildx es más estándar y eficiente para GitHub Actions
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build an image from Dockerfile
        run: docker build -t app:${{ github.sha }} .

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: caromero.azurecr.io
          username: ${{ vars.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # CORREGIDO: Se usa docker/build-push-action para subir al ACR
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-args: |
            BUILD_TAG=v${{ github.run_number }}
          tags: |
            ${{ env.IMAGE_NAME }}v${{ github.run_number }}
            ${{ env.IMAGE_NAME }}:latest
          push: true
          cache-from: |
            type=gha
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: |
            type=gha,mode=max
            type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: webapp deploy
        uses: azure/webapps-deploy@v2
        with:
            app-name: caromero13
            slot-name: Production
            publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE}}
            images: ${{ env.IMAGE_NAME }}:latest